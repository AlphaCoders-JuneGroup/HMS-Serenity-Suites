<div class="min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-serenity-900 text-white flex flex-col">
    <div class="p-6 border-b border-serenity-700">
      <h1 class="text-xl font-bold tracking-tight">Serenity Suites</h1>
      <p class="text-serenity-300 text-sm mt-1">Hotel Management</p>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-serenity-700 text-white"
          [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-serenity-200 hover:bg-serenity-800 hover:text-white transition-colors"
        >
          <span>{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="p-4 border-t border-serenity-700">
      <p class="text-xs text-serenity-400">AlphaCoders &copy; 2026</p>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>
