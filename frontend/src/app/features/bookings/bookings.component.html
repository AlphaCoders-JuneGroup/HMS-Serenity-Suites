<div class="p-8">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Bookings</h2>
      <p class="text-gray-500 mt-1">Manage reservations and check-ins</p>
    </div>
    <button class="btn-primary">+ New Booking</button>
  </div>

  @if (loading) {
    <div class="text-center text-gray-400 py-12">Loading bookings...</div>
  } @else if (error) {
    <div class="card text-red-500">{{ error }}</div>
  } @else if (bookings.length === 0) {
    <div class="card text-center py-12">
      <p class="text-gray-400 text-lg">No bookings found</p>
      <p class="text-gray-300 text-sm mt-2">Create your first booking to get started</p>
    </div>
  } @else {
    <div class="space-y-4">
      @for (booking of bookings; track $index) {
        <div class="card">
          <pre class="text-xs text-gray-600 overflow-auto">{{ booking | json }}</pre>
        </div>
      }
    </div>
  }
</div>
