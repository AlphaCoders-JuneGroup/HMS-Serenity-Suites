<div class="p-8">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Rooms</h2>
      <p class="text-gray-500 mt-1">Manage hotel rooms and availability</p>
    </div>
    <button class="btn-primary">+ Add Room</button>
  </div>

  @if (loading) {
    <div class="text-center text-gray-400 py-12">Loading rooms...</div>
  } @else if (error) {
    <div class="card text-red-500">{{ error }}</div>
  } @else if (rooms.length === 0) {
    <div class="card text-center py-12">
      <p class="text-gray-400 text-lg">No rooms found</p>
      <p class="text-gray-300 text-sm mt-2">Add your first room to get started</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (room of rooms; track $index) {
        <div class="card">
          <pre class="text-xs text-gray-600 overflow-auto">{{ room | json }}</pre>
        </div>
      }
    </div>
  }
</div>
